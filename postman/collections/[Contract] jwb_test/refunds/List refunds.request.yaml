examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "refunds": [
              {
                "refundId": "rfnd_abc123def456",
                "transactionId": "txn_1234567890abcdef",
                "status": "completed",
                "amount": 5000,
                "currency": "USD",
                "refundAmount": 5000,
                "refundCurrency": "USD",
                "reason": "Customer requested refund",
                "createdAt": "2024-01-15T10:30:00Z",
                "completedAt": "2024-01-15T14:25:00Z",
                "links": {
                  "self": "/refunds/rfnd_abc123def456"
                }
              },
              {
                "refundId": "rfnd_xyz789ghi012",
                "transactionId": "txn_0987654321fedcba",
                "status": "pending",
                "amount": 5000,
                "currency": "USD",
                "refundAmount": 2500,
                "refundCurrency": "USD",
                "reason": "Partial refund for damaged item",
                "createdAt": "2024-01-15T11:00:00Z",
                "links": {
                  "self": "/refunds/rfnd_xyz789ghi012"
                }
              }
            ],
            "pagination": {
              "page": 1,
              "pageSize": 20,
              "totalPages": 3,
              "totalItems": 47,
              "hasNext": true,
              "hasPrevious": false
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Successful response with refund list
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "VALIDATION_ERROR",
            "message": "Invalid request parameters",
            "details": {
              "field": "transactionId",
              "issue": "Invalid format"
            },
            "code": "VALIDATION_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Bad request - Invalid input
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "error": "UNAUTHORIZED",
            "message": "Authentication token is required",
            "code": "AUTHENTICATION_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized - Invalid or missing authentication
  - response:
      statusCode: 429
      statusText: Too Many Requests
      body:
        type: json
        content: |-
          {
            "error": "RATE_LIMIT_EXCEEDED",
            "message": "Rate limit exceeded. Please retry after the specified time",
            "details": {
              "limit": 100,
              "window": "1 minute",
              "retryAfter": 45
            },
            "code": "RATE_LIMIT_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Too many requests - Rate limit exceeded
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "INTERNAL_SERVER_ERROR",
            "message": "An unexpected error occurred",
            "details": {
              "requestId": "req_abc123def456"
            },
            "code": "SERVER_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
